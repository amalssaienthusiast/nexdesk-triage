name: nexdesk-ticket-triage
version: "1.1.0"
description: >
  NexDesk IT Ticket Triage — an OpenEnv environment for training and evaluating
  AI agents on real-world IT helpdesk tasks. Features time pressure, SLA dynamics,
  confidence calibration, crisis surge mode, and multi-dimensional scoring.
  
  Agents must classify, route, and resolve IT support tickets with increasing
  complexity across four tasks, including a novel crisis surge scenario that
  tests batch ticket handling under pressure.
author: amalscicoder
tags:
  - openenv
  - it-helpdesk
  - ticket-triage
  - customer-support
  - nlp
  - time-pressure
  - confidence-calibration

tasks:
  - id: ticket_classify
    description: >
      Given an IT support ticket (subject + description), classify the priority
      (low/medium/high/critical) and category (network/hardware/software/access/security/other).
      Includes optional confidence field for calibration scoring.
    difficulty: easy
    max_steps: 1
    reward_range: [0.01, 0.99]
    sla_minutes: 60

  - id: ticket_route
    description: >
      Classify the ticket AND route it to the correct team
      (helpdesk/network-ops/sysadmin/security/dev), then identify the affected system.
      Two-step episode with partial rewards at each step. Time pressure applies.
    difficulty: medium
    max_steps: 2
    reward_range: [0.01, 0.99]
    sla_minutes: 30

  - id: ticket_resolve
    description: >
      Full ticket resolution pipeline over 3 steps:
      (1) classify + assign team,
      (2) identify affected system + write first response to user,
      (3) provide resolution steps + estimate SLA in hours.
      Time pressure increases with each step.
    difficulty: hard
    max_steps: 3
    reward_range: [0.01, 0.99]
    sla_minutes: 20

  - id: crisis_surge
    description: >
      CRISIS MODE: Handle a 10-ticket surge during a simulated production outage.
      Each step processes one ticket. Agent must prioritize critical tickets,
      triage efficiently, and maintain accuracy under time pressure.
      Unique feature: batch ticket handling with dynamic stress levels.
    difficulty: hard
    max_steps: 10
    reward_range: [0.01, 0.99]
    sla_minutes: 5
    is_batch: true

observation_space:
  type: object
  properties:
    # Core ticket info
    ticket_id: {type: string}
    subject: {type: string}
    description: {type: string}
    submitter: {type: string}
    department: {type: string}
    submitted_at: {type: string}
    
    # Episode state
    task: {type: string}
    step: {type: integer}
    max_steps: {type: integer}
    last_reward: {type: number}
    session_id: {type: string}
    message: {type: string}
    
    # Innovation: Time pressure fields
    sla_deadline_minutes: {type: integer, description: "Minutes remaining until SLA breach"}
    queue_depth: {type: integer, description: "Number of pending tickets"}
    stress_level: {type: number, description: "Current stress level (0 to 1)"}
    
    # Innovation: Contextual information
    org_context: {type: object, description: "Organizational context for richer decisions"}
    similar_tickets: {type: array, description: "Similar historical tickets for pattern matching"}
    
    # Batch mode info (crisis_surge only)
    batch_info: {type: object, description: "Batch processing info for crisis mode"}

action_space:
  type: object
  properties:
    session_id: {type: string, required: true}
    
    # Classification fields
    priority: {type: string, enum: [low, medium, high, critical]}
    category: {type: string, enum: [network, hardware, software, access, security, other]}
    
    # Routing fields
    team: {type: string, enum: [helpdesk, network-ops, sysadmin, security, dev]}
    affected_system: {type: string}
    
    # Resolution fields
    first_response: {type: string}
    resolution_steps: {type: array, items: {type: string}}
    sla_hours: {type: integer}
    
    # Innovation: Confidence calibration
    confidence: 
      type: number
      min: 0
      max: 1
      description: "Agent's confidence in this action. Well-calibrated confidence earns bonus."
    
    # Innovation: Action types for advanced scenarios
    action_type:
      type: string
      enum: [classify, respond, resolve, delegate, escalate]
      description: "Optional action type for multi-agent scenarios"
    
    reasoning:
      type: string
      description: "Optional reasoning for the action"

server:
  port: 7860
  health_endpoint: /health
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
  metrics_endpoint: /metrics

innovations:
  time_pressure:
    description: >
      Real IT helpdesks have SLA clocks ticking. This environment simulates
      time pressure with configurable SLA deadlines per task and ticket priority.
      Rewards decrease as SLA deadline approaches.
    
  confidence_calibration:
    description: >
      Agents can optionally provide confidence scores (between 0 and 1) with each action.
      Well-calibrated agents (confidence ≈ accuracy) earn bonus rewards.
      Overconfident wrong answers incur penalty.
    
  crisis_surge_mode:
    description: >
      Novel task type: Handle 10 tickets flooding in during a simulated production
      outage. Tests prioritization, batch processing efficiency, and accuracy
      under stress. Unique to this environment.
    
  multi_dimensional_scoring:
    description: >
      Beyond single scores, the environment provides detailed breakdowns by
      dimension (priority, category, team, response quality, etc.) for analysis.
    
  business_metrics:
    description: >
      Track real-world business impact: cost savings, SLA compliance rate,
      automation success rate, and ROI projections. Demonstrates practical value.

baselines:
  model: "Qwen/Qwen2.5-72B-Instruct"
  results:
    ticket_classify: 0.85
    ticket_route: 0.78
    ticket_resolve: 0.65
    crisis_surge: 0.60
  notes: >
    Baseline tested with temperature=0.2, no confidence calibration.
    Crisis surge is intentionally challenging.
