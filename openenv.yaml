name: nexdesk-ticket-triage
description: >
  IT helpdesk ticket triage environment. Agents classify, route, and resolve
  support tickets under SLA time pressure, with confidence calibration,
  knowledge base hints, and crisis surge handling.
version: "2.0.0"
author: NexDesk Team
tags:
  - it-helpdesk
  - ticket-triage
  - classification
  - routing
  - nlp
  - real-world
repository: ""
tasks:
  - id: ticket_classify
    description: "Classify a support ticket's priority and category"
    difficulty: easy
    max_steps: 1
    reward_range: [0.01, 0.99]
    grader: grade_classify
  - id: ticket_route
    description: "Classify and route a ticket to the correct team, identify affected system"
    difficulty: medium
    max_steps: 2
    reward_range: [0.01, 0.99]
    grader: grade_route
  - id: ticket_resolve
    description: "Full resolution pipeline — classify, respond to user, provide resolution steps"
    difficulty: hard
    max_steps: 3
    reward_range: [0.01, 0.99]
    grader: grade_resolve
  - id: crisis_surge
    description: "Handle a surge of 10 tickets during a production outage under time pressure"
    difficulty: hard
    max_steps: 10
    reward_range: [0.01, 0.99]
    grader: grade_crisis
action_schema:
  type: object
  required:
    - session_id
  properties:
    session_id:
      type: string
      description: Session ID from reset
    priority:
      type: string
      enum: [low, medium, high, critical]
      description: Ticket priority level
    category:
      type: string
      enum: [network, hardware, software, access, security, other]
      description: Ticket category
    team:
      type: string
      enum: [helpdesk, network-ops, sysadmin, security, dev]
      description: Team to route the ticket to
    affected_system:
      type: string
      description: Primary system affected
    first_response:
      type: string
      description: Professional first response to the user
    resolution_steps:
      type: array
      items:
        type: string
      description: List of resolution steps
    sla_hours:
      type: integer
      minimum: 0
      maximum: 168
      description: Estimated hours to resolve
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Agent confidence in this action
    action_type:
      type: string
      enum: [classify, respond, resolve, delegate, escalate]
      description: Type of action being taken
    reasoning:
      type: string
      description: Agent's reasoning for this action
observation_schema:
  type: object
  properties:
    ticket_id:
      type: string
    subject:
      type: string
    description:
      type: string
    submitter:
      type: string
    department:
      type: string
    submitted_at:
      type: string
    task:
      type: string
    step:
      type: integer
    max_steps:
      type: integer
    last_reward:
      type: number
    session_id:
      type: string
    message:
      type: string
    sla_deadline_minutes:
      type: integer
    queue_depth:
      type: integer
    stress_level:
      type: number
    org_context:
      type: object
    similar_tickets:
      type: array
    knowledge_hints:
      type: object
    batch_info:
      type: object
reward_range:
  min: 0.01
  max: 0.99
